<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PerformAI - Login</title>
    <style>
      :root {
        --primary-color: #6c3e99;
        --secondary-color: #003a70;
        --white: #ffffff;
        --gray-light: #f5f5f5;
        --gray-medium: #9e9e9e;
        --success-color: #4caf50;
        --danger-color: #e74c3c;

        --font-primary: "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        --font-size-base: 16px;
        --font-size-small: 14px;
        --font-size-h2: 24px;

        --space-xs: 4px;
        --space-sm: 8px;
        --space-md: 16px;
        --space-lg: 24px;
        --space-xl: 32px;

        --radius-md: 8px;
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-primary);
        font-size: var(--font-size-base);
        line-height: 1.6;
        color: #000;
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-md);
      }

      .login-container {
        width: 100%;
        max-width: 420px;
      }

      .login-card {
        background: var(--white);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
        padding: var(--space-lg);
      }

      .logo {
        width: 100%;
        max-width: 180px;
        height: auto;
        margin: 0 auto var(--space-lg);
        display: block;
        text-align: center;
        font-size: var(--font-size-h2);
        font-weight: bold;
        color: var(--primary-color);
      }

      .login-form h1 {
        font-size: var(--font-size-h2);
        color: var(--secondary-color);
        margin-bottom: var(--space-lg);
        text-align: center;
      }

      .form-group {
        margin-bottom: var(--space-md);
      }

      label {
        display: block;
        margin-bottom: var(--space-sm);
        font-weight: 600;
        color: var(--secondary-color);
        font-size: var(--font-size-small);
      }

      .input {
        width: 100%;
        padding: var(--space-sm) var(--space-md);
        border: 1px solid #ddd;
        border-radius: var(--radius-md);
        font-size: var(--font-size-base);
        font-family: var(--font-primary);
        transition: border-color 0.2s;
      }

      .input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(108, 62, 153, 0.1);
      }

      .form-group-checkbox {
        display: flex;
        align-items: center;
        margin-bottom: var(--space-lg);
        gap: var(--space-sm);
      }

      .form-group-checkbox input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      .form-group-checkbox label {
        margin: 0;
        font-weight: 400;
        cursor: pointer;
        font-size: var(--font-size-base);
      }

      .btn {
        display: block;
        width: 100%;
        padding: var(--space-md) var(--space-lg);
        background-color: var(--primary-color);
        color: var(--white);
        border: none;
        border-radius: var(--radius-md);
        font-size: var(--font-size-base);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        min-height: 48px;
      }

      .btn:hover {
        opacity: 0.9;
        box-shadow: var(--shadow-lg);
      }

      .form-footer {
        margin-top: var(--space-lg);
        text-align: center;
      }

      .link {
        color: var(--primary-color);
        text-decoration: none;
        font-size: var(--font-size-small);
        font-weight: 600;
        transition: color 0.2s;
      }

      .link:hover {
        color: var(--secondary-color);
      }

      .divider {
        margin: var(--space-lg) 0;
        text-align: center;
        color: var(--gray-medium);
        font-size: var(--font-size-small);
      }

      /* Responsive */
      @media (max-width: 480px) {
        .login-card {
          padding: var(--space-md);
        }

        .login-form h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">🎯 PerformAI</div>

        <form class="login-form">
          <h1>Iniciar Sesión</h1>

          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              class="input"
              placeholder="correo@empresa.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              class="input"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="form-group-checkbox">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Recuérdame en este dispositivo</label>
          </div>

          <button type="submit" class="btn">Iniciar Sesión</button>

          <div class="divider">—</div>

          <div class="form-footer">
            <a href="#" class="link">¿Olvidó su contraseña?</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
