<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PerformAI - Evaluación 180°</title>
    <style>
      :root {
        --primary-color: #6c3e99;
        --secondary-color: #003a70;
        --white: #ffffff;
        --gray-light: #f5f5f5;
        --gray-medium: #9e9e9e;
        --success-color: #4caf50;
        --danger-color: #e74c3c;

        --font-primary: "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        --font-size-base: 16px;
        --font-size-small: 14px;
        --font-size-h3: 20px;
        --font-size-h2: 24px;

        --space-xs: 4px;
        --space-sm: 8px;
        --space-md: 16px;
        --space-lg: 24px;
        --space-xl: 32px;

        --radius-md: 8px;
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-primary);
        font-size: var(--font-size-base);
        line-height: 1.6;
        color: #000;
        background: var(--gray-light);
      }

      /* HEADER */
      .navbar {
        background: linear-gradient(
          135deg,
          var(--secondary-color),
          var(--primary-color)
        );
        color: var(--white);
        padding: var(--space-md) var(--space-lg);
        box-shadow: var(--shadow-md);
      }

      .navbar-brand {
        font-size: var(--font-size-h3);
        font-weight: bold;
      }

      /* CONTAINER */
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: var(--space-lg);
      }

      /* PROGRESS BAR */
      .progress-section {
        background: var(--white);
        padding: var(--space-lg);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        margin-bottom: var(--space-lg);
      }

      .progress-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--space-md);
        font-size: var(--font-size-small);
        color: var(--gray-medium);
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--gray-light);
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--success-color)
        );
        width: 27%; /* 3 of 11 questions answered */
        transition: width 0.3s ease;
      }

      /* QUESTION CARD */
      .question-card {
        background: var(--white);
        padding: var(--space-lg);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        margin-bottom: var(--space-lg);
      }

      .question-header {
        margin-bottom: var(--space-lg);
        padding-bottom: var(--space-md);
        border-bottom: 2px solid var(--gray-light);
      }

      .question-counter {
        font-size: var(--font-size-small);
        color: var(--gray-medium);
        margin-bottom: var(--space-sm);
      }

      .question-text {
        font-size: var(--font-size-h2);
        color: var(--secondary-color);
        font-weight: 600;
      }

      .question-type {
        font-size: var(--font-size-small);
        color: var(--gray-medium);
        margin-top: var(--space-sm);
      }

      .badge {
        display: inline-block;
        padding: var(--space-xs) var(--space-sm);
        border-radius: 4px;
        font-size: var(--font-size-small);
        font-weight: 600;
        background-color: var(--primary-color);
        color: var(--white);
      }

      /* SCALE 1-5 */
      .form-section {
        margin-bottom: var(--space-lg);
      }

      .form-section label {
        display: block;
        margin-bottom: var(--space-md);
        font-weight: 600;
        color: var(--secondary-color);
      }

      .scale-1to5 {
        display: flex;
        justify-content: space-between;
        gap: var(--space-md);
        margin-bottom: var(--space-md);
      }

      .scale-1to5 input[type="radio"] {
        display: none;
      }

      .scale-1to5 label {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid var(--gray-light);
        cursor: pointer;
        transition: all 0.2s;
        margin: 0;
        font-weight: 600;
        background: var(--white);
        flex: 0 0 auto;
      }

      .scale-1to5 input[type="radio"]:checked + label {
        background: var(--primary-color);
        color: var(--white);
        border-color: var(--primary-color);
        box-shadow: var(--shadow-md);
      }

      .scale-labels {
        display: flex;
        justify-content: space-between;
        font-size: var(--font-size-small);
        color: var(--gray-medium);
        margin-top: var(--space-sm);
      }

      /* NOT APPLICABLE */
      .form-group-checkbox {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        margin-bottom: var(--space-lg);
      }

      .form-group-checkbox input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .form-group-checkbox label {
        margin: 0;
        font-weight: 400;
        cursor: pointer;
        font-size: var(--font-size-base);
      }

      /* TEXTAREA */
      textarea {
        width: 100%;
        min-height: 100px;
        padding: var(--space-md);
        border: 1px solid #ddd;
        border-radius: var(--radius-md);
        font-size: var(--font-size-base);
        font-family: var(--font-primary);
        resize: vertical;
      }

      textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(108, 62, 153, 0.1);
      }

      /* BUTTONS */
      .button-group {
        display: flex;
        gap: var(--space-md);
        margin-top: var(--space-lg);
      }

      .btn {
        flex: 1;
        padding: var(--space-md) var(--space-lg);
        background-color: var(--primary-color);
        color: var(--white);
        border: none;
        border-radius: var(--radius-md);
        font-size: var(--font-size-base);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        min-height: 48px;
      }

      .btn:hover {
        opacity: 0.9;
        box-shadow: var(--shadow-lg);
      }

      .btn-secondary {
        background-color: var(--secondary-color);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* QUESTION NAVIGATOR */
      .question-nav {
        background: var(--white);
        padding: var(--space-lg);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        margin-bottom: var(--space-lg);
      }

      .nav-title {
        font-size: var(--font-size-small);
        color: var(--gray-medium);
        margin-bottom: var(--space-md);
        text-transform: uppercase;
        font-weight: 600;
      }

      .nav-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(30px, 1fr));
        gap: var(--space-xs);
      }

      .nav-btn {
        aspect-ratio: 1;
        border: 1px solid var(--gray-light);
        background: var(--white);
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
      }

      .nav-btn:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
      }

      .nav-btn.active {
        background: var(--primary-color);
        color: var(--white);
        border-color: var(--primary-color);
      }

      .nav-btn.answered {
        background: var(--success-color);
        color: var(--white);
        border-color: var(--success-color);
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .container {
          padding: var(--space-md);
        }

        .question-text {
          font-size: var(--font-size-h3);
        }

        .scale-1to5 label {
          width: 40px;
          height: 40px;
          font-size: 12px;
        }

        .button-group {
          flex-direction: column;
        }

        .nav-buttons {
          grid-template-columns: repeat(auto-fit, minmax(25px, 1fr));
        }
      }

      @media (max-width: 480px) {
        .container {
          padding: var(--space-sm);
        }

        .question-card {
          padding: var(--space-md);
        }

        .scale-1to5 {
          flex-wrap: wrap;
        }

        .scale-1to5 label {
          width: 35px;
          height: 35px;
          font-size: 11px;
        }

        .btn {
          font-size: 14px;
          padding: var(--space-sm) var(--space-md);
          min-height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-brand">🎯 PerformAI</div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
      <!-- PROGRESS -->
      <div class="progress-section">
        <div class="progress-info">
          <span>Progreso: <strong>3 de 11</strong> preguntas respondidas</span>
          <span><strong>27%</strong></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- QUESTION NAVIGATOR -->
      <div class="question-nav">
        <div class="nav-title">Navegación rápida</div>
        <div class="nav-buttons">
          <button class="nav-btn answered">1</button>
          <button class="nav-btn answered">2</button>
          <button class="nav-btn answered">3</button>
          <button class="nav-btn active">4</button>
          <button class="nav-btn">5</button>
          <button class="nav-btn">6</button>
          <button class="nav-btn">7</button>
          <button class="nav-btn">8</button>
          <button class="nav-btn">9</button>
          <button class="nav-btn">10</button>
          <button class="nav-btn">11</button>
        </div>
      </div>

      <!-- QUESTION CARD -->
      <div class="question-card">
        <!-- HEADER -->
        <div class="question-header">
          <div class="question-counter">Pregunta 4 de 11</div>
          <div class="question-text">
            ¿Colaboras efectivamente con el equipo?
          </div>
          <div class="question-type">
            <span class="badge">Base</span>
            <span
              style="
                color: var(--gray-medium);
                margin-left: var(--space-sm);
                font-size: var(--font-size-small);
              "
              >Categoría: Colaboración</span
            >
          </div>
        </div>

        <!-- SCALE 1-5 -->
        <form>
          <div class="form-section">
            <label>Tu respuesta *</label>

            <div class="scale-1to5">
              <input type="radio" id="q4-1" name="q4" value="1" />
              <label for="q4-1">1</label>

              <input type="radio" id="q4-2" name="q4" value="2" />
              <label for="q4-2">2</label>

              <input type="radio" id="q4-3" name="q4" value="3" />
              <label for="q4-3">3</label>

              <input type="radio" id="q4-4" name="q4" value="4" />
              <label for="q4-4">4</label>

              <input type="radio" id="q4-5" name="q4" value="5" />
              <label for="q4-5">5</label>
            </div>

            <div class="scale-labels">
              <span>Totalmente en desacuerdo</span>
              <span>Totalmente de acuerdo</span>
            </div>
          </div>

          <!-- NOT APPLICABLE -->
          <div class="form-group-checkbox">
            <input type="checkbox" id="not-applicable" name="not-applicable" />
            <label for="not-applicable">No aplica a mi rol</label>
          </div>

          <!-- JUSTIFICATION -->
          <div class="form-section">
            <label for="justification">Justificación (opcional)</label>
            <textarea
              id="justification"
              placeholder="Proporciona contexto o ejemplos que respalden tu respuesta..."
            ></textarea>
          </div>

          <!-- BUTTONS -->
          <div class="button-group">
            <button type="button" class="btn btn-secondary">← Anterior</button>
            <button type="button" class="btn">Siguiente →</button>
          </div>

          <button
            type="button"
            class="btn"
            style="
              width: 100%;
              margin-top: var(--space-md);
              background-color: var(--success-color);
            "
          >
            ✓ Enviar Evaluación
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
